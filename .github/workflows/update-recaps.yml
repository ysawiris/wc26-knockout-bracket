name: Update match recaps

on:
  schedule:
    # Every 30 minutes — a recap lands within ~30 min of full-time.
    # The script only (re)writes recaps for matches whose score/goals
    # changed, so most runs are a no-op.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # trigger a refresh by hand from the Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/generate-recaps.mjs"
      - ".github/workflows/update-recaps.yml"

# contents: write  — commit the refreshed data back to the repo.
# models: read     — call the free GitHub Models inference API with the
#                    built-in GITHUB_TOKEN (no extra secret needed).
permissions:
  contents: write
  models: read

# Don't pile up overlapping runs.
concurrency:
  group: update-recaps
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      # Provider chain (first that answers wins, then the built-in writer):
      #   1. NVIDIA NIM     — add a repo secret NVIDIA_API_KEY (nvapi-…).
      #   2. GitHub Models  — the built-in token, free, via models: read.
      # Any/all can be absent; recaps are still produced by the built-in writer.
      - name: Generate recaps
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-recaps.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/recaps.json)" ]]; then
            git config user.name "wc26-bot"
            git config user.email "actions@github.com"
            git add data/recaps.json
            git commit -m "chore: knockout match recaps update [skip ci]"
            # The scores bot may have pushed while this job ran — rebase first.
            git pull --rebase origin main
            git push
            echo "Pushed updated recaps."
          else
            echo "No changes to commit."
          fi
