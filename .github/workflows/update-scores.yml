name: update-scores

# Pulls real FIFA knockout results into data/live.json on a schedule so the
# hub stays live with no one touching it. The app reads live.json network-first,
# overlays the scores onto the bracket, and auto-advances winners — so finished
# games show their score and the standings re-rank on their own.

on:
  schedule:
    - cron: "*/10 * * * *" # every ~10 minutes (GitHub may delay under load)
  workflow_dispatch: {} # manual "Run workflow" button
  push:
    paths:
      - "scripts/fetch-scores.mjs"
      - ".github/workflows/update-scores.yml"

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch live knockout scores
        run: node scripts/fetch-scores.mjs
      - name: Commit data/live.json if it changed
        run: |
          if [[ -n "$(git status --porcelain data/live.json)" ]]; then
            git config user.name "wc26-scores-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/live.json
            git commit -m "chore: live knockout scores [skip ci]"
            git push
          else
            echo "No score change — nothing to commit."
          fi
